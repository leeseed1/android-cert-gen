name: Windows Portable App Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Create Portable App Folder
        run: gradle createDistributable --no-daemon

      - name: Upload Zip Pack
        uses: actions/upload-artifact@v4
        with:
          name: CertGenerator-Windows-Portable
          path: build/compose/binaries/main/app/**
